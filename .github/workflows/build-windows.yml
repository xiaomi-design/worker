name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:    # 允许手动触发

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: PyInstaller 打包
        run: pyinstaller build_app_win.spec --clean --noconfirm

      - name: 压缩成 zip
        run: |
          cd dist
          Compress-Archive -Path "下注机器人" -DestinationPath "下注机器人-windows.zip"
        shell: pwsh

      - name: 上传打包产物
        uses: actions/upload-artifact@v4
        with:
          name: 下注机器人-windows
          path: dist/下注机器人-windows.zip
          retention-days: 30

