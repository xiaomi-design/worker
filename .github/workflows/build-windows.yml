name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:    # 允许手动触发

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: PyInstaller 打包
        run: pyinstaller build_app_win.spec --clean --noconfirm

      - name: 压缩成 zip
        run: |
          cd dist
          Compress-Archive -Path "微信记账机器人" -DestinationPath "微信记账机器人-windows.zip"
        shell: pwsh

      - name: 上传打包产物
        uses: actions/upload-artifact@v6
        with:
          name: 微信记账机器人-windows
          path: dist/微信记账机器人-windows.zip
          retention-days: 30

