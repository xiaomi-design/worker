name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:    # 允许手动触发

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          # 兜底：单独再装一次 pywebview，确保打包环境一定有
          pip install --upgrade --force-reinstall --no-deps pywebview

      - name: 验证关键依赖已装上
        shell: bash
        continue-on-error: true
        run: |
          echo "=== pip list ==="
          pip list
          echo "=== import webview ==="
          python -c "import webview; print('webview OK:', webview.__file__)" || echo "webview FAIL"
          echo "=== import flask ==="
          python -c "import flask; print('flask OK:', flask.__version__)" || echo "flask FAIL"
          echo "=== import wxauto ==="
          python -c "import wxauto; print('wxauto OK:', wxauto.__file__)" || echo "wxauto FAIL（仅 Windows 才有）"
          echo "=== pip show pywebview ==="
          pip show pywebview || true
          echo "=== requirements.txt ==="
          cat requirements.txt

      - name: PyInstaller 打包
        run: pyinstaller build_app_win.spec --clean --noconfirm --log-level INFO

      - name: 压缩成 zip
        run: |
          cd dist
          Compress-Archive -Path "微信记账机器人" -DestinationPath "微信记账机器人-windows.zip"
        shell: pwsh

      - name: 上传打包产物
        uses: actions/upload-artifact@v6
        with:
          name: 微信记账机器人-windows
          path: dist/微信记账机器人-windows.zip
          retention-days: 30

