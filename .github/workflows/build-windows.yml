name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:    # 允许手动触发

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          # 兜底：再装一次 pywebview（含全部依赖如 proxy_tools/typing_extensions/bottle 等）
          pip install --upgrade --force-reinstall pywebview
          # 显式补装 pywebview 在 import 阶段需要的依赖（部分版本会漏装）
          pip install proxy_tools typing_extensions bottle

      - name: 验证关键依赖已装上
        shell: bash
        continue-on-error: true
        run: |
          mkdir -p build-logs
          {
            echo "=== pip list ==="
            pip list
            echo "=== import webview ==="
            python -c "import webview; print('webview OK:', webview.__file__)" 2>&1 || echo "webview FAIL"
            echo "=== import flask ==="
            python -c "import flask; print('flask OK:', flask.__version__)" 2>&1 || echo "flask FAIL"
            echo "=== import wxauto ==="
            python -c "import wxauto; print('wxauto OK:', wxauto.__file__)" 2>&1 || echo "wxauto FAIL"
            echo "=== pip show pywebview ==="
            pip show pywebview 2>&1 || true
            echo "=== which python ==="
            python -c "import sys; print(sys.executable); print(sys.version)"
            echo "=== requirements.txt ==="
            cat requirements.txt
          } | tee build-logs/verify.log

      - name: PyInstaller 打包
        shell: bash
        continue-on-error: true
        run: |
          mkdir -p build-logs
          pyinstaller build_app_win.spec --clean --noconfirm --log-level INFO 2>&1 | tee build-logs/pyinstaller.log
          echo "exit=${PIPESTATUS[0]}" > build-logs/pyinstaller.exit

      - name: 上传构建日志（无论成败）
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: build-logs
          path: build-logs/
          retention-days: 7

      - name: 检查打包是否成功
        shell: bash
        run: |
          if [ ! -d "dist/微信记账机器人" ]; then
            echo "::error::dist/微信记账机器人 不存在，打包失败"
            echo "============ verify.log ============"
            cat build-logs/verify.log || true
            echo "============ pyinstaller.log 最后 200 行 ============"
            tail -200 build-logs/pyinstaller.log || true
            echo "============ pyinstaller.log 中所有 ERROR/Traceback/FATAL ============"
            grep -n -E "ERROR|Traceback|FATAL|SystemExit|spec\]" build-logs/pyinstaller.log || true
            exit 1
          fi
          echo "OK: 打包成功"

      - name: 压缩成 zip
        run: |
          cd dist
          Compress-Archive -Path "微信记账机器人" -DestinationPath "微信记账机器人-windows.zip"
        shell: pwsh

      - name: 上传打包产物
        uses: actions/upload-artifact@v6
        with:
          name: 微信记账机器人-windows
          path: dist/微信记账机器人-windows.zip
          retention-days: 30

