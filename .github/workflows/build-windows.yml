name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:    # 允许手动触发

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      # Windows 默认 cp1252 编码，Python print 中文会 UnicodeEncodeError，全局强制 UTF-8
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: '1'

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 安装依赖
        shell: bash
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          # 兜底：再装一次 pywebview（含全部依赖如 proxy_tools/typing_extensions/bottle 等）
          pip install --upgrade --force-reinstall pywebview
          # 显式补装 pywebview 在 import 阶段需要的依赖（部分版本会漏装）
          pip install proxy_tools typing_extensions bottle
          # 装 wxauto4 的 runtime 依赖（uiautomation/comtypes 在 PyPI 上仍在）
          pip install uiautomation comtypes pywin32
          # wxauto4（适配微信 4.x；3.x 版 wxauto 在微信 4.x 上必报 1400 句柄失效）
          # 多重 fallback：① PyPI 官方 ② 清华镜像 ③ 阿里镜像 ④ GitHub 源码
          pip install wxauto4 \
            || pip install wxauto4 -i https://pypi.tuna.tsinghua.edu.cn/simple \
            || pip install wxauto4 -i https://mirrors.aliyun.com/pypi/simple/ \
            || pip install "git+https://github.com/cluic/wxauto4.git@main" \
            || { echo "::error::wxauto4 四种来源全部失败"; exit 1; }
          PYTHONIOENCODING=utf-8 python -c "import wxauto4; print('wxauto4 version:', getattr(wxauto4, 'VERSION', getattr(wxauto4, '__version__', 'unknown')))"

      - name: 验证关键依赖已装上
        shell: bash
        continue-on-error: true
        run: |
          mkdir -p build-logs
          {
            echo "=== pip list ==="
            pip list
            echo "=== import webview ==="
            python -c "import webview; print('webview OK:', webview.__file__)" 2>&1 || echo "webview FAIL"
            echo "=== import flask ==="
            python -c "import flask; print('flask OK:', flask.__version__)" 2>&1 || echo "flask FAIL"
            echo "=== import wxauto4 ==="
            python -c "import wxauto4; print('wxauto4 OK:', wxauto4.__file__)" 2>&1 || echo "wxauto4 FAIL"
            echo "=== pip show pywebview ==="
            pip show pywebview 2>&1 || true
            echo "=== which python ==="
            python -c "import sys; print(sys.executable); print(sys.version)"
            echo "=== requirements.txt ==="
            cat requirements.txt
          } | tee build-logs/verify.log

      - name: PyInstaller 打包
        shell: bash
        continue-on-error: true
        run: |
          mkdir -p build-logs
          pyinstaller build_app_win.spec --clean --noconfirm --log-level INFO 2>&1 | tee build-logs/pyinstaller.log
          echo "exit=${PIPESTATUS[0]}" > build-logs/pyinstaller.exit

      - name: 上传构建日志（无论成败）
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: build-logs
          path: build-logs/
          retention-days: 7

      - name: 检查打包是否成功
        shell: bash
        run: |
          # 总是打印 spec 输出 + WARN/ERROR 关键行（无论成功失败）
          echo "============ pyinstaller.log [spec]/WARN/ERROR 行 ============"
          grep -n -E "spec\]|WARNING|ERROR|Traceback|FATAL|module named" build-logs/pyinstaller.log || true
          echo "============ dist 内容 ============"
          ls -la dist/ || true
          ls dist/微信记账机器人/_internal/ 2>/dev/null | head -50 || true
          echo "============ 检查 flask 是否打进 _internal ============"
          ls dist/微信记账机器人/_internal/flask/ 2>/dev/null && echo "flask OK" || echo "flask 未打入 _internal!"
          if [ ! -d "dist/微信记账机器人" ]; then
            echo "::error::dist/微信记账机器人 不存在，打包失败"
            cat build-logs/verify.log || true
            tail -200 build-logs/pyinstaller.log || true
            exit 1
          fi
          echo "OK: 打包成功"

      - name: 压缩成 zip
        run: |
          cd dist
          Compress-Archive -Path "微信记账机器人" -DestinationPath "微信记账机器人-windows.zip"
        shell: pwsh

      - name: 上传打包产物
        uses: actions/upload-artifact@v6
        with:
          name: 微信记账机器人-windows
          path: dist/微信记账机器人-windows.zip
          retention-days: 30

